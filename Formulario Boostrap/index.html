<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container text-center">
    <h1 class="container text-center">Registro</h1>
    <form class="row g-3">
  <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Nombre</label>
    <input type="text" class="form-control" id="inputEmail4">
  </div>
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Apellidos</label>
    <input type="text" class="form-control" id="inputPassword4">
  </div>
  <div class="col-12">
    <label for="inputAddress" class="form-label">Correo</label>
    <input type="email" class="form-control" id="inputAddress" placeholder="Ingrese su correo">
  </div>
  <div class="col-12">
    <label for="inputAddress2" class="form-label">Contraseña</label>
    <input type="password" class="form-control" id="inputAddress2" placeholder="Ingrese su contraseña">
  </div>
  <div class="col-md-6">
    <label for="inputCity" class="form-label">Fecha de Nacimiento</label>
    <input type="date" class="form-control" id="inputCity">
  </div>
  <div class="col-md-4">
    <label for="inputState" class="form-label">Departamento</label>
    <select id="inputState" class="form-select">
      <option selected>Eliga su departamento</option>
      <option>La Paz</option>
      <option>San Miguel Tepezontes</option>
    </select>
  </div>
  <div class="col-md-2">
    <label for="inputZip" class="form-label">Codigo Postal</label>
    <input type="text" class="form-control" id="inputZip">
  </div>
  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="gridCheck">
      <label class="form-check-label" for="gridCheck"></label>
      <a href="hoa.como">Terminos y Condiciones</a>
    </div>
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">Registrarse</button>
  </div>
</form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
